services:
  nastune:
    image: ghcr.io/d3vil-st/nastune:latest
    privileged: true          # required for mount syscalls inside the container
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /mnt/music:/music:ro  # NAS music share — read-only
      - ./data:/data          # persistent SQLite database
      # - ./ipod:/mnt/ipod    # iPod mount point shared with host
      - type: tmpfs
        target: /tmp/nastune-cache
        tmpfs:
          size: 536870912     # 512 MB for ALAC transcode cache
    devices:
      - /dev/bus/usb
    environment:
      IPOD_AUTOMOUNT: 1
    restart: unless-stopped
